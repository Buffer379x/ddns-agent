services:
  ddns-agent:
    build: .
    container_name: ddns-agent
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ddns-data:/data
    environment:
      - DDNS_DATA_DIR=/data
      - DDNS_PORT=8080
      # Optional: set a fixed JWT secret for persistent sessions across restarts
      # - DDNS_JWT_SECRET=your-secret-here
      # Optional: set a fixed encryption key (64 hex chars = 32 bytes)
      # - DDNS_ENCRYPTION_KEY=your-64-char-hex-key
    healthcheck:
      test: ["CMD", "/ddns-agent", "--health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  ddns-data:
    driver: local
